# HTTPRoutes for Envoy Gateway Migration
# Phase 2: Route all services through the new gateway
# Created: 2026-03-06 (Nightly Session #18)
#
# Order (least critical → most critical):
# 1. secondbrain
# 2. mission-control
# 3. kubementor-dashboard
# 4. kubementor-api
# 5. kubementor-landing (kubementor.io)
# 6. argocd
# 7. blog (lesterbarahona.com)
# 8. blog www redirect

---
# 1. Second Brain - Simple proxy
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secondbrain
  namespace: secondbrain
spec:
  parentRefs:
  - name: main-gateway
    namespace: envoy-gateway-system
  hostnames:
  - "2ndbrain.lesterbarahona.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: secondbrain
      port: 3000

---
# 2. Mission Control - Path-based routing (API + frontend)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mission-control
  namespace: mission-control
spec:
  parentRefs:
  - name: main-gateway
    namespace: envoy-gateway-system
  hostnames:
  - "mission.lesterbarahona.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/
    backendRefs:
    - name: backend
      port: 8080
  - matches:
    - path:
        type: Exact
        value: /health
    backendRefs:
    - name: backend
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 3000

